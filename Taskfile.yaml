version: "3"

includes:
  talos: .tasks/talos.yaml
  kubernetes: .tasks/kubernetes.yaml

tasks:
  init:
    desc: Install all tools from flake.nix into the nix profile (run once after container (re)build)
    cmds:
      - nix profile add /workspace#
      - direnv allow /workspace
      - cp /root/.claude/backups/.claude.json.backup.1782489431743 /root/.claude.json

  cloudflared:dns-bootstrap:
    desc: "Create Cloudflare Tunnel DNS routes for all hostnames in cloudflared config.yaml (idempotent)"
    cmds:
      - |
        yq '.ingress[].hostname | select(. != null)' kubernetes/apps/network/cloudflared/app/configs/config.yaml | \
          xargs -I{} cloudflared tunnel route dns homeops {}
