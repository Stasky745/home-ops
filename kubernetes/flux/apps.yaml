apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    # Inject install/upgrade remediation defaults into every HelmRelease so
    # individual releases don't repeat the boilerplate. Opt out by adding the
    # label flux.home/helm-defaults: skip to a specific HelmRelease.
    - target:
        group: helm.toolkit.fluxcd.io
        kind: HelmRelease
        labelSelector: "!flux.home/helm-defaults"
      patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: not-used
        spec:
          install:
            remediation:
              retries: 3
          upgrade:
            cleanupOnFail: true
            remediation:
              strategy: rollback
              retries: 3
