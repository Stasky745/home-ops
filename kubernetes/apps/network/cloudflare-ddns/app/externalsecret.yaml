apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-ddns-token
  namespace: network
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: cloudflare-ddns-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: CF - stasky.win Edit Zone DNS
        property: credential
