apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-ddns
  namespace: network
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: network
  values:
    controllers:
      cloudflare-ddns:
        containers:
          app:
            image:
              repository: timothyjmiller/cloudflare-ddns
              tag: v2.1.2
            env:
              CF_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: cloudflare-ddns-token
                    key: api-token
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
    persistence:
      config:
        type: configMap
        name: cloudflare-ddns-config
        globalMounts:
          - path: /config.yaml
            subPath: config.yaml
            readOnly: true
