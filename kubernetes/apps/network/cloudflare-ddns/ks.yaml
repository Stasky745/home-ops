apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-ddns
  namespace: flux-system
spec:
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: cloudflare-ddns
  dependsOn:
    - name: external-secrets-clustersecretstore
  path: ./kubernetes/apps/network/cloudflare-ddns/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cloudflare-ddns
      namespace: network
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      name: app-template
      namespace: network
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: cloudflare-ddns-token
      namespace: network
