apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: network
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: network
  values:
    provider:
      name: cloudflare
    sources:
      - gateway-httproute
    extraArgs:
      - --gateway-name=external
      - --gateway-namespace=network
      - --cloudflare-proxied
    domainFilters:
      - stasky.win
    txtOwnerId: external-dns
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare-token
            key: api-token
    serviceAccount:
      create: true
    rbac:
      create: true
    podAnnotations:
      reloader.stakater.com/auto: "true"
