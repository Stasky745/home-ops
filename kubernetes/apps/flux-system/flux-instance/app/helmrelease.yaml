apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-instance
  namespace: flux-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: flux-instance
  values:
    instance:
      components:
        - source-controller
        - kustomize-controller
        - helm-controller
        - notification-controller
      cluster:
        type: kubernetes
        domain: cluster.local
        networkPolicy: false
      sync:
        kind: GitRepository
        name: flux-system
        url: https://github.com/Stasky745/home-ops.git
        ref: refs/heads/main
        path: kubernetes/flux
        pullSecret: flux-system
        interval: 1h
