---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-settings
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: cluster-settings
    creationPolicy: Owner
  data:
    - secretKey: ACME_EMAIL
      remoteRef:
        key: CertManager
        property: ACME_EMAIL
