apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cilium
      version: "1.19.5"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  values:
    # Talos does not allow Cilium to auto-mount cgroups
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    # Required capabilities on Talos
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    kubeProxyReplacement: true
    k8sServiceHost: "${CLUSTER_VIP}"
    k8sServicePort: "6443"
    # Gateway API handled by Envoy Gateway, not Cilium
    gatewayAPI:
      enabled: false
    l2announcements:
      enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
