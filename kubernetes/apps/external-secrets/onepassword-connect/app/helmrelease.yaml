apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: connect
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: onepassword-connect
        namespace: external-secrets
  values:
    connect:
      serviceType: ClusterIP
