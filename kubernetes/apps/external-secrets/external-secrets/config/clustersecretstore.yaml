apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect
      vaults:
        HomeOps: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: op-credentials
            namespace: external-secrets
            key: token
